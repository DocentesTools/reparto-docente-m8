services:
  cert-init:
    image: alpine:3.22
    volumes:
      - ./traefik/certs:/certs
    command:
      - sh
      - -c
      - |
        if [ -f /certs/local.crt ]; then
          echo "==> cert-init: certs found, skipping"; exit 0
        fi
        apk add --no-cache --quiet openssl
        openssl req -x509 -newkey rsa:2048 -nodes \
          -keyout /certs/local.key -out /certs/local.crt \
          -days 365 -subj "/CN=localhost" \
          -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
        chmod 600 /certs/local.key && chmod 644 /certs/local.crt
        echo "==> cert-init: self-signed cert ready (browsers will warn)"
        echo "    For trusted certs: mkcert -install, then bash init.sh --rotate-certs"
    restart: "no"

  traefik:
    image: traefik:v3.7.5
    ports:
      - "8000:80"
      - "4430:443/tcp"
      - "4430:443/udp"
      - "127.0.0.1:8080:8080"
      - "${API_BIND_IP:-127.0.0.1}:9000:9000"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic_conf.yml:/etc/traefik/dynamic_conf.yml:ro
      - ./traefik/certs:/etc/traefik/certs:ro
    depends_on:
      cert-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - m8_app_network

  m8_db:
    image: postgres:18.4-alpine
    volumes:
      - ./db_data:/var/lib/postgresql
      - ../shared/db_init:/docker-entrypoint-initdb.d:ro
    env_file:
      - ./.env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGPORT=${DB_PORT}
    ports:
      - "127.0.0.1:${DB_PORT}:${DB_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p ${DB_PORT} -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s
      start_interval: 2s
    restart: unless-stopped
    networks:
      - m8_app_network

  redis_cache:
    image: redis:8.8.0-alpine
    volumes:
      - ./redis/redis_data:/data
    ports:
      - '127.0.0.1:6379:6379'
    command:
      - sh
      - -c
      - |
        redis-server --save 20 1 --loglevel warning --requirepass "${REDIS_PASSWORD}" &
        until redis-cli ping 2>/dev/null | grep -q PONG; do sleep 0.2; done
        redis-cli ACL SETUSER auth on \>"${REDIS_PASSWORD}" "~oauth_session:*" "~auth_code:*" "~login:*" "~refresh:*" "~exchange:*" "~rt:*" "~jwt:blacklist:*" "~rate:*" "~api_key:*" +@read +@write +@transaction +@connection +eval -@dangerous "+client|setinfo"
        redis-cli ACL SETUSER default on \>"${REDIS_PASSWORD}" resetkeys -@all +@connection -@dangerous
        wait
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDISCLI_AUTH=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - m8_app_network

  auth_user_service:
    build:
      context: ../../../fa-auth-m8
      dockerfile: ./auth_user_service/Dockerfile
    env_file:
      - ./auth.env
    volumes:
      - ../../../fa-auth-m8/auth_user_service:/opt/auth_user_service
      - ./auth.env:/opt/auth_user_service/.env:ro
      - ./shared_migrations:/opt/shared_migrations
    depends_on:
      m8_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/user/health/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - m8_app_network

  reparto_service:
    build:
      context: ../../..
      dockerfile: ./reparto_service/Dockerfile
    env_file:
      - ./api.env
    volumes:
      - ../../reparto_service:/opt/reparto_service
      - ./api.env:/opt/reparto_service/.env:ro
      - ./shared_migrations:/opt/shared_migrations
    depends_on:
      m8_db:
        condition: service_healthy
      auth_user_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/reparto/health/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - m8_app_network

networks:
  m8_app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.0.0/16
          gateway: 172.16.0.1
